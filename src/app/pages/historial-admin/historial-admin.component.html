<div class="historial-container">
    <h2>Historial de Accesos al Sistema</h2>
    <div class="header-row">
        <div>
            <p class="muted">Registro de inicios de sesión en la plataforma web.</p>
        </div>
        <div class="controls">
            <input type="text" placeholder="Buscar por tipo o IP..." [(ngModel)]="filtroAccesos">
        </div>
    </div>

    <div class="table-wrapper">
        <div class="loading" *ngIf="loadingAccesos">
            <p>Cargando datos del servidor...</p>
        </div>

        <table *ngIf="!loadingAccesos">
            <thead>
                <tr>
                    <th>Fecha</th>
                    <th>Tipo de Evento</th>
                    <th>Dirección IP</th>
                    <th>Estado</th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let r of accesosFiltrados">
                    <td>{{ r.executed_at | date:'dd/MM/yyyy HH:mm' }}</td>
                    <td>{{ r.event_type }}</td>
                    <td>{{ r.client_ip }}</td>
                    <td>
                        <span class="badge" [ngClass]="getStatusClass(r.event_status)">
                            {{ r.event_status }}
                        </span>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
