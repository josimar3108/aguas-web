<div class="page-wrapper is-full-page">
  <div class="map-container relative-container">

    <div class="search-bar">
      <input type="text" placeholder="Buscar calle, colonia, lugar..." [(ngModel)]="textoBusqueda"
        (keyup.enter)="buscarLugar()" />
      <button (click)="buscarLugar()">
        <span class="material-symbols-outlined">search</span>
      </button>
    </div>

    <div class="map-frame">
      <div class="map-inner">
        <google-map [height]="'100%'" [width]="'100%'" [center]="center" [zoom]="zoom">

          <ng-container *ngFor="let inc of realIncidents">
            <map-marker *ngIf="inc.latitude && inc.longitude"
              [position]="obtenerPosicionSegura(inc)" 
              [title]="inc.type"
              [icon]="obtenerIcono(inc.type)">
            </map-marker>
          </ng-container>

        </google-map>
      </div>
    </div>

    <button class="btn-gps" (click)="irAmiUbicacion()" title="Ir a mi ubicación actual">
      <span class="icono-gps">📍</span>
    </button>

  </div>
</div>
