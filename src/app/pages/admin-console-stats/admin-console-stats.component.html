<div class="admin-console">
    <div class="kpi-grid">
        <div class="kpi-card" *ngFor="let k of kpis">
            <h3>{{ k.label }}</h3>
            <p>{{ k.value }}</p>
        </div>
    </div>

    <div class="charts-section">
        <div class="chart-box">
            <h2>Tendencia Semanal</h2>
            <canvas id="weeklyChart"></canvas>
        </div>
        <div class="chart-box">
            <h2>Picos de Actividad (24h)</h2>
            <canvas id="radarChart"></canvas>
        </div>
        <div class="chart-box">
            <h2>Volumen Mensual</h2>
            <canvas id="monthlyChart"></canvas>
        </div>
        <div class="chart-box">
            <h2>Incidentes por Tipo</h2>
            <canvas id="incidentTypesChart"></canvas>
        </div>
        <div class="chart-box">
            <h3>Carga Operativa por Dependencia</h3>
            <canvas id="teamLoadChart"></canvas>
        </div>
        <div class="chart-box">
            <h3>Top 5 Zonas de Riesgo</h3>
            <canvas id="zonesChart"></canvas>
        </div>
        <div class="chart-box">
            <h2>Distribución de Riesgo</h2>
            <canvas id="riskDistributionChart"></canvas>
        </div>
        <div class="chart-box">
            <h3>Estado Operativo</h3>
            <canvas id="statusChart"></canvas>
        </div>
    </div>
</div>
